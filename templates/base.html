<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WhatsApp Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-brand">WA Tracker</div>
        <div class="nav-links">
            <a href="{{ url_for('tasks_page') }}" class="{% if request.endpoint == 'tasks_page' %}active{% endif %}">Tasks</a>
            <a href="{{ url_for('my_tasks_page') }}" class="{% if request.endpoint == 'my_tasks_page' %}active{% endif %}">My Tasks</a>
            <a href="{{ url_for('contacts_page') }}" class="{% if request.endpoint == 'contacts_page' %}active{% endif %}">Contacts</a>
            <a href="{{ url_for('approvals_page') }}" class="{% if request.endpoint == 'approvals_page' %}active{% endif %}">Approvals</a>
            <a href="{{ url_for('emails_page') }}" class="{% if request.endpoint == 'emails_page' %}active{% endif %}">Emails</a>
            <a href="{{ url_for('digest_page') }}" class="{% if request.endpoint == 'digest_page' %}active{% endif %}">Digest</a>
            <a href="{{ url_for('summaries_page') }}" class="{% if request.endpoint == 'summaries_page' %}active{% endif %}">Summaries</a>
            <a href="{{ url_for('log_page') }}" class="{% if request.endpoint == 'log_page' %}active{% endif %}">Log</a>
            <a href="{{ url_for('logout') }}" class="logout">Logout</a>
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
