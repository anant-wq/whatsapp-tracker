{% extends "base.html" %}
{% block title %}Webhook Log — WA Tracker{% endblock %}
{% block content %}
<h2>Webhook Log</h2>
<div class="table-wrap">
<table>
    <thead>
        <tr>
            <th>Timestamp</th>
            <th>Event</th>
            <th>Details</th>
        </tr>
    </thead>
    <tbody>
    {% for l in logs %}
        <tr>
            <td class="mono">{{ l.timestamp }}</td>
            <td>{{ l.event }}</td>
            <td class="log-detail">{{ l.details[:200] }}</td>
        </tr>
    {% endfor %}
    {% if not logs %}
        <tr><td colspan="3" class="empty">No log entries yet.</td></tr>
    {% endif %}
    </tbody>
</table>
</div>
{% endblock %}
